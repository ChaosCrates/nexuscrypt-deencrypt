<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexusCrypt</title>
    <style>
        body { background: #050505; color: hsl(197, 100%, 50%); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { border: 1px solid #00ff41; padding: 25px; width: 90%; max-width: 800px; box-shadow: 0 0 20px #00ff4144; margin-bottom: 20px; }
        h1 { text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-top: 0; letter-spacing: 3px; text-shadow: 0 0 10px #00ff41; }
        h2 { font-size: 1.1em; border-left: 4px solid #00ff41; padding-left: 10px; margin-top: 30px; color: #fff; background: #00ff4122; }
        
        .section { margin-bottom: 20px; padding-top: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; color: #00ff41; }
        
        textarea, input { 
            width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; 
            padding: 10px; box-sizing: border-box; font-family: 'Courier New', monospace; outline: none;
        }
        textarea:focus, input:focus { box-shadow: 0 0 5px #00ff41; }
        
        .key-container { display: flex; gap: 10px; }
        .btn-row { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        button { 
            flex: 1; min-width: 150px; background: #00ff41; color: #000; border: none; padding: 12px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { background: #fff; color: #000; }
        .secondary-btn { background: #222; color: #00ff41; border: 1px solid #00ff41; }
        
        .status { font-size: 0.8em; margin-top: 10px; color: #aaa; font-style: italic; }
        audio { width: 100%; margin-top: 10px; filter: invert(100%) hue-rotate(90deg); }
        hr { border: 0; border-top: 1px solid #00ff4133; margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>NEXUSCRYPT</h1>

    <!-- MASTER KEY -->
    <div class="section">
        <label>52-CHARACTER MASTER KEY (REQUIRED):</label>
        <div class="key-container">
            <input type="text" id="keyInput" maxlength="52" placeholder="Paste or Generate 52 digits...">
            <button class="secondary-btn" onclick="generateRandomKey()" style="width: auto;">GENERATE NEW</button>
        </div>
    </div>

    <hr>

    <!-- TEXT MODULE -->
    <h2>MODULE 01: TEXT TRANSLATION</h2>
    <div class="section">
        <label>INPUT DATA:</label>
        <textarea id="inputArea" rows="3" placeholder="Enter text to hide or numbers to reveal..."></textarea>
        <div class="btn-row">
            <button onclick="encryptText()">ENCODE TEXT</button>
            <button onclick="decryptText()">DECODE NUMBERS</button>
        </div>
        <label style="margin-top:15px;">OUTPUT DATA:</label>
        <textarea id="outputArea" rows="3" readonly></textarea>
    </div>

    <hr>

    <!-- AUDIO MODULE -->
    <h2>MODULE 02: AUDIO ENCRYPTION</h2>
    <div class="section">
        <label>SELECT AUDIO FILE:</label>
        <input type="file" id="audioFile" accept="audio/*">
        
        <div class="btn-row">
            <button onclick="processAudio(true)">ENCRYPT AUDIO</button>
            <button onclick="processAudio(false)">DECRYPT AUDIO</button>
        </div>
        
        <div id="audioStatus" class="status">System Ready...</div>
        <div id="audioOutputContainer" style="display:none; margin-top:15px; border: 1px dashed #00ff41; padding: 10px;">
            <label>PROCESSED SIGNAL:</label>
            <audio id="resultAudio" controls></audio>
            <br><br>
            <a id="downloadLink" style="color:#00ff41; text-decoration: none; font-weight: bold; border: 1px solid #00ff41; padding: 5px 10px;">💾 DOWNLOAD FILE</a>
        </div>
    </div>
</div>

<!-- YOUR STARTUP SOUND -->
<audio id="startupSound" src="https://github.com/ChaosCrates/asset/blob/main/NexusCrypt.wav?raw=true"></audio>

<script>
    const alphabet = "abcdefghijklmnopqrstuvwxyz";

    function generateRandomKey() {
        let pairs = [];
        while(pairs.length < 26) {
            let num = Math.floor(Math.random() * 90 + 10).toString();
            if(!pairs.includes(num)) pairs.push(num);
        }
        document.getElementById('keyInput').value = pairs.join('');
    }

    function getMaps() {
        const key = document.getElementById('keyInput').value;
        if(key.length !== 52) { 
            alert("CRITICAL ERROR: Key must be exactly 52 digits."); 
            return null; 
        }
        let eMap = {}, dMap = {};
        for (let i = 0; i < 26; i++) {
            let pair = key.substring(i * 2, (i * 2) + 2);
            eMap[alphabet[i]] = pair;
            dMap[pair] = alphabet[i];
        }
        return { eMap, dMap };
    }

    // --- TEXT LOGIC ---
    function encryptText() {
        const maps = getMaps();
        if(!maps) return;
        const input = document.getElementById('inputArea').value.toLowerCase();
        let out = "";
        for(let char of input) { out += maps.eMap[char] || char; }
        document.getElementById('outputArea').value = out;
    }

    function decryptText() {
        const maps = getMaps();
        if(!maps) return;
        const input = document.getElementById('inputArea').value;
        let out = "", i = 0;
        while (i < input.length) {
            let chunk = input.substring(i, i + 2);
            if(maps.dMap[chunk]) { out += maps.dMap[chunk]; i += 2; }
            else { out += input[i]; i++; }
        }
        document.getElementById('outputArea').value = out;
    }

    // --- AUDIO LOGIC ---
    async function processAudio(isEncrypt) {
        const fileInput = document.getElementById('audioFile');
        if (!fileInput.files[0]) { alert("No audio file detected."); return; }
        
        const status = document.getElementById('audioStatus');
        status.innerText = "ALGORITHM RUNNING...";
        
        const key = document.getElementById('keyInput').value;
        if(key.length !== 52) { alert("Invalid Key Length."); return; }
        
        // Use key characters to create a unique salt
        const salt = key.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0) % 255;
        const shift = isEncrypt ? salt : (256 - salt);

        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();
        const data = new Uint8Array(arrayBuffer);

        // Binary manipulation
        for (let i = 0; i < data.length; i++) {
            data[i] = (data[i] + shift) % 256;
        }

        const blob = new Blob([data], { type: file.type });
        const url = URL.createObjectURL(blob);
        
        document.getElementById('resultAudio').src = url;
        const dl = document.getElementById('downloadLink');
        dl.href = url;
        dl.download = (isEncrypt ? "NEXUS_ENC_" : "NEXUS_DEC_") + file.name;
        
        document.getElementById('audioOutputContainer').style.display = "block";
        status.innerText = isEncrypt ? "ENCRYPTION COMPLETE." : "DECRYPTION COMPLETE.";
    }

    // Startup sound triggers on first user click
    window.addEventListener('click', () => {
        const audio = document.getElementById('startupSound');
        audio.volume = 0.5;
        audio.play().catch(() => {});
    }, { once: true });

    // Auto-generate key on load
    generateRandomKey();
</script>

</body>
</html>
